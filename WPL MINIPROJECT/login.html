<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">EcoTrack</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalogue.html">Catalogue</a></li>
      <li><a href="tracker.html">Tracker</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="active">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<section class="form-page section-shell compact-shell">
  <div class="form-box auth-box">
    <p class="section-tag center-tag">User Access</p>
    <h2>Login to EcoTrack</h2>
    <p class="form-intro">Use your registered email and password to access the platform.</p>
    <form onsubmit="return loginMessage()">
      <label for="loginEmail">Email Address</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required>

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required>

      <button type="submit" class="btn form-btn">Login</button>
    </form>
    <p class="form-link">Don't have an account? <a href="register.html">Create one here</a></p>
  </div>
</section>

<footer>
  <p>© 2026 EcoTrack | Login page for project demonstration.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
