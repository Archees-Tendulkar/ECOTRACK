<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">EcoTrack</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalogue.html">Catalogue</a></li>
      <li><a href="tracker.html">Tracker</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="active">Register</a></li>
    </ul>
  </nav>
</header>

<section class="form-page section-shell compact-shell">
  <div class="form-box auth-box">
    <p class="section-tag center-tag">New User</p>
    <h2>Create your EcoTrack account</h2>
    <p class="form-intro">Fill in the details below to create a demo account for the project interface.</p>
    <form onsubmit="return registerMessage()">
      <label for="registerName">Full Name</label>
      <input type="text" id="registerName" placeholder="Enter your full name" required>

      <label for="registerEmail">Email Address</label>
      <input type="email" id="registerEmail" placeholder="Enter your email" required>

      <label for="registerPassword">Password</label>
      <input type="password" id="registerPassword" placeholder="Create a password" required>

      <label for="registerConfirmPassword">Confirm Password</label>
      <input type="password" id="registerConfirmPassword" placeholder="Re-enter the password" required>

      <button type="submit" class="btn form-btn">Register</button>
    </form>
    <p class="form-link">Already registered? <a href="login.html">Login here</a></p>
  </div>
</section>

<footer>
  <p>© 2026 EcoTrack | Registration page for user onboarding demo.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
